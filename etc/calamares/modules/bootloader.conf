efiBootLoader: "grub"

# Hybrid GRUB disabled: GPT+btrfs has no BIOS Boot Partition and btrfs
# doesn't support blocklists, so i386-pc grub-install always fails fatally.
# Calamares will install EFI GRUB on UEFI systems, i386-pc GRUB on BIOS systems.
installHybridGRUB: false

kernelSearchPath: "/usr/lib/modules"
kernelPattern: "^vmlinuz.*"
loaderEntries:
  - "timeout 5"
  - "console-mode keep"
kernelParams: [ "quiet","nowatchdog","loglevel=3","nvme_load=yes" ]

grubInstall: "grub-install"
grubMkconfig: "grub-mkconfig"
grubCfg: "/boot/grub/grub.cfg"
grubProbe: "grub-probe"
efiBootMgr: "efibootmgr"
installEFIFallback: true
